<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Inquiry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">

    <a href="dashboard.html" class="navbar-brand">
        🏗 BuildBridge
    </a>

    <button id="logoutBtn" class="btn btn-light btn-sm">
        Logout
    </button>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">Create Project Inquiry</h2>

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Site Name</label>
            <input type="text" id="siteName" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Project Type</label>
            <input type="text" id="projectType" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Location</label>
            <input type="text" id="location" class="form-control">
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">BHK Count</label>
            <input type="number" id="bhkCount" class="form-control">
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">Floor Count</label>
            <input type="number" id="floorCount" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">Budget</label>
            <input type="number" id="budget" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">Duration</label>
            <input type="text" id="duration" class="form-control" placeholder="6 Months">
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">Start Date</label>
            <input type="date" id="startDate" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">End Date</label>
            <input type="date" id="endDate" class="form-control">
        </div>

    </div>

    <button id="addSiteBtn" class="btn btn-primary mt-3">
        Submit Inquiry
    </button>

    <hr class="my-5">

    <h3>All Project Inquiries</h3>

    <table class="table table-bordered table-striped">

        <thead class="table-primary">

        <tr>
            <th>ID</th>
            <th>Site Name</th>
            <th>Project Type</th>
            <th>Location</th>
            <th>Status</th>
        </tr>

        </thead>

        <tbody id="siteTableBody">

        </tbody>

    </table>

</div>

<script src="js/api.js"></script>
<script src="js/projectSites.js"></script>

<footer>
    <hr>
    <small>© 2026 BuildBridge | Construction Management System</small>
</footer>

</body>

</html>
