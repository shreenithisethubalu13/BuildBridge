<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            📊 BuildBridge Reports
        </span>

        <a href="dashboard-admin.html"
           class="btn btn-light">

            Dashboard

        </a>

    </div>

</nav>

<div class="container mt-4">

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h1 id="total">0</h1>

                    <p>Total Projects</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h1 id="pending">0</h1>

                    <p>Pending</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h1 id="assigned">0</h1>

                    <p>Assigned</p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h1 id="completed">0</h1>

                    <p>Completed</p>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/reports.js"></script>

</body>
</html>
